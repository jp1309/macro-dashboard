name: Actualizar datos WEO del FMI

on:
  schedule:
    # Abril: días 14-18 a las 10:00 UTC
    - cron: "0 10 14-18 4 *"
    # Octubre: días 14-18 a las 10:00 UTC
    - cron: "0 10 14-18 10 *"
  workflow_dispatch:  # permite ejecución manual

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests pandas lxml

      - name: Guardar hash actual del CSV
        run: sha256sum latam_weo_all.csv > /tmp/hash_before.txt

      - name: Descargar datos del FMI
        run: python download.py

      - name: Verificar si hay datos nuevos
        id: check
        run: |
          sha256sum latam_weo_all.csv > /tmp/hash_after.txt
          if diff -q /tmp/hash_before.txt /tmp/hash_after.txt > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios en los datos — WEO aún no actualizado."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Datos actualizados detectados."
          fi

      - name: Commit y push si hay datos nuevos
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latam_weo_all.csv
          git commit -m "Actualización automática datos WEO $(date +'%B %Y')"
          git push
